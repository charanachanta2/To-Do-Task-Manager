<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flask To-Do Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow"></p>
      <h1>To-Do Task Manager</h1>
      <p class="subtitle">A full-stack CRUD app with task priorities, progress tracking, filters, and persistent storage.</p>
    </div>
  </header>

  <main class="container">
    <section class="panel form-panel">
      <h2>Add or Update Task</h2>
      <form id="taskForm" class="task-form">
        <input type="hidden" id="taskId" />
        <div class="field-group">
          <label for="taskTitle">Task title</label>
          <input id="taskTitle" type="text" placeholder="Enter a task" required maxlength="100" />
        </div>

        <div class="row">
          <div class="field-group">
            <label for="taskPriority">Priority</label>
            <select id="taskPriority">
              <option value="High">High</option>
              <option value="Medium" selected>Medium</option>
              <option value="Low">Low</option>
            </select>
          </div>

          <div class="field-group">
            <label for="taskStatus">Status</label>
            <select id="taskStatus">
              <option value="pending" selected>Pending</option>
              <option value="completed">Completed</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn btn-primary" id="submitBtn">Add Task</button>
          <button type="button" class="btn btn-secondary" id="resetBtn">Clear</button>
        </div>
      </form>
    </section>

    <section class="panel stats-panel">
      <h2>Progress Overview</h2>
      <div class="stats-grid">
        <article class="stat-card"><span>Total</span><strong id="totalTasks">0</strong></article>
        <article class="stat-card"><span>Completed</span><strong id="completedTasks">0</strong></article>
        <article class="stat-card"><span>Pending</span><strong id="pendingTasks">0</strong></article>
      </div>

      <div class="progress-wrapper">
        <div class="progress-meta">
          <span>Task completion</span>
          <span id="progressText">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </section>

    <section class="panel list-panel">
      <div class="list-header">
        <h2>Task List</h2>
        <select id="filterTasks" class="filter-select">
          <option value="all">All tasks</option>
          <option value="pending">Pending</option>
          <option value="completed">Completed</option>
          <option value="High">High priority</option>
          <option value="Medium">Medium priority</option>
          <option value="Low">Low priority</option>
        </select>
      </div>

      <div id="messageBox" class="message hidden"></div>
      <div id="taskList" class="task-list"></div>
      <p id="emptyState" class="empty-state">No tasks yet. Add your first task to get started.</p>
    </section>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</body>
</html>
